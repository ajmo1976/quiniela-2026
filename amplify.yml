version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Generar el archivo .env.production de forma segura usando printf (evita errores con caracteres especiales en claves/URLs)
        - printf "DATABASE_URL=%s\n" "$DATABASE_URL" >> .env.production
        - printf "NEXTAUTH_SECRET=%s\n" "$NEXTAUTH_SECRET" >> .env.production
        - printf "NEXTAUTH_URL=%s\n" "$NEXTAUTH_URL" >> .env.production
        - printf "GOOGLE_CLIENT_ID=%s\n" "$GOOGLE_CLIENT_ID" >> .env.production
        - printf "GOOGLE_CLIENT_SECRET=%s\n" "$GOOGLE_CLIENT_SECRET" >> .env.production
        - printf "EMERGENCY_ADMIN_EMAIL=%s\n" "$EMERGENCY_ADMIN_EMAIL" >> .env.production
        - printf "EMERGENCY_ADMIN_PASSWORD=%s\n" "$EMERGENCY_ADMIN_PASSWORD" >> .env.production
        - printf "APP_AWS_ACCESS_KEY_ID=%s\n" "$APP_AWS_ACCESS_KEY_ID" >> .env.production
        - printf "APP_AWS_SECRET_ACCESS_KEY=%s\n" "$APP_AWS_SECRET_ACCESS_KEY" >> .env.production
        - printf "APP_AWS_REGION=%s\n" "$APP_AWS_REGION" >> .env.production
        - printf "APP_AWS_S3_BUCKET_NAME=%s\n" "$APP_AWS_S3_BUCKET_NAME" >> .env.production
        # Generar el cliente de Prisma (obligatorio antes de compilar Next.js en entornos frescos de CI/CD)
        - npx prisma generate
        # Compilar la aplicación
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
