version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Generar el archivo .env.production para inyectar las variables del Build a Runtime de Next.js SSR en Amplify
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
        - echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" >> .env.production
        - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env.production
        - echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> .env.production
        - echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> .env.production
        - echo "EMERGENCY_ADMIN_EMAIL=$EMERGENCY_ADMIN_EMAIL" >> .env.production
        - echo "EMERGENCY_ADMIN_PASSWORD=$EMERGENCY_ADMIN_PASSWORD" >> .env.production
        - echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> .env.production
        - echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> .env.production
        - echo "AWS_REGION=$AWS_REGION" >> .env.production
        - echo "AWS_S3_BUCKET_NAME=$AWS_S3_BUCKET_NAME" >> .env.production
        # Compilar la aplicación
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
